<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Service - Multigift Plumbing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50">

    <!-- NAV BAR - Copy from index.html -->

    <div class="max-w-2xl mx-auto px-6 py-24">
        <h1 class="text-5xl font-bold text-center mb-12 text-blue-600">Book a Plumber</h1>
        
        <form action="https://formsubmit.co/YOUR-EMAIL@gmail.com" method="POST" class="bg-white p-10 rounded-3xl shadow-xl space-y-8">
            <div>
                <label class="block mb-2 font-medium">Full Name *</label>
                <input type="text" name="name" required class="w-full px-6 py-5 border rounded-2xl">
            </div>
            
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block mb-2 font-medium">Phone Number *</label>
                    <input type="tel" name="phone" required class="w-full px-6 py-5 border rounded-2xl">
                </div>
                <div>
                    <label class="block mb-2 font-medium">Email</label>
                    <input type="email" name="email" class="w-full px-6 py-5 border rounded-2xl">
                </div>
            </div>

            <div>
                <label class="block mb-2 font-medium">Service Needed</label>
                <select name="service" class="w-full px-6 py-5 border rounded-2xl">
                    <option>Leak Repair</option>
                    <option>Pipe Installation</option>
                    <option>Bathroom/Kitchen Fitting</option>
                    <option>Water Tank Cleaning</option>
                    <option>Borehole Drilling</option>
                    <option>General Plumbing</option>
                </select>
            </div>

            <div>
                <label class="block mb-2 font-medium">Address / Description</label>
                <textarea name="message" rows="5" class="w-full px-6 py-5 border rounded-3xl" placeholder="Efab Lokogoma, No 169, Abuja..."></textarea>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-7 rounded-3xl text-2xl font-semibold hover:bg-blue-700">
                Send Booking Request
            </button>
        </form>
    </div>
</body>
</html>
